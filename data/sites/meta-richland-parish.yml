notes: >
  Under construction; nine buildings phased through 2030. Capacity updated to
  5 GW: the earlier record carried the firm 2 GW (Meta) with 5 GW as a long-run
  plan; the July 2026 DCD report ("expands to 5GW & $50bn") now confirms the
  expansion, so capacity_mw is raised to 5,000 and the 2 GW figure is retained
  as the earlier committed phase. Investment updated to $50B on the same DCD
  report (plus a stated $1B in local infrastructure improvements); prior figures
  ($10B+ original Meta announcement, $27B Blue Owl Capital JV financing) reflect
  narrower scopes/rounds and are superseded by the newer, larger total.
  Land: 2,250 + 1,400 acres (3,650 total, primary breakdown retained);
  Wikipedia says "nearly 4,000 acres," a mild upward discrepancy against a
  low-confidence source, so the sourced 3,650 figure is kept and noted.
