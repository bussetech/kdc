notes: >
  Under construction; 3,700+ workers on site, nine buildings phased through
  2030. Capacity 2+ GW (Meta) scaling to 5 GW (DCD) — value shown is the firm
  2 GW; 5 GW is the long-run plan, now also corroborated by Wikipedia
  (sig-20260706-hyperion-capacity, low confidence tertiary source).
  Investment conflicts by scope: $10B+ original announcement (Meta) vs $27B
  Blue Owl Capital JV financing (DCD, the value used); larger long-run press
  figures not fetch-verified. Land: 2,250 + 1,400 acres (3,650 total, primary
  breakdown retained); Wikipedia (sig-20260706-hyperion-land) says "nearly
  4,000 acres after buying an additional 1,400 acres" — a mild upward
  discrepancy against a low-confidence source, so the sourced 3,650 figure is
  kept and the Wikipedia figure is noted rather than adopted.
