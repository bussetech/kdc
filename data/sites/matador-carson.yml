notes: >-
  Operator Fermi America needs an operators.yml entry (omitted here) — company
  led by a former Texas governor and US Energy Secretary. Capacity is a
  potential ceiling ("up to 11 GW" = 11000MW); building_sqft "up to 18M sq ft"
