notes: >-
  Single-source (WDRB) cluster. Proposed $6B, 267-acre, eight-building
  campus in rural Oldham County, KY. Status kept as announced: early
  approval stage (March/April 2025), still requires a land-use change and
  has drawn local resistance — not yet permitted, not cancelled. Developer
  reported as Western Hospitality Partners, which needs an operators.yml
  entry before it can be recorded as a developer id. No locality given in
