notes: >
  Newport Equities LLC / Province Group (also filed as LC West LLC, originally
  "Powhatan Technology Park") — all mapped to province-group.
  Status permitted: Board approved rezoning + CUP (75-ft buildings). Approval
  path: Aug 2024 original proposal deferred by Powhatan Planning Commission;
  initial 119.9-acre rezoning/CUP approved 3-2 on 2024-10-28; further 61.8 acres
  approved unanimously 2025-10-29, creating a 181-acre campus. Planning Commission
  recommended denial both times (utility-proffer concerns, later resolved).
  land_acres 181 = 61.8 (2025) + 119.9-120 (2024).
  building_sqft conflict: county (Oct 2025) says "2-million-square-foot"; Virginia
  Business (2024) cites 1.525M sqft filed across three data centers (plus six
  support structures). County (government, newer) figure used; minority claim
  noted.
  investment_usd 2.7B per county; developer estimate $3B.