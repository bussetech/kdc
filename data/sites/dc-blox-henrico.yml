notes: >-
  DC BLOX's first Virginia facility. The rezoning request was WITHDRAWN in
  early 2025 after the Planning Commission recommended denial, following
  community negotiations; the project is live and proceeding by-right on
  ~5 acres of the 30-acre property — NOT cancelled. Status kept as
  announced pending construction confirmation.
  Land conflict: DCD (Aug 2024) reports 27 acres; DCF (Mar 2025) reports
  ~5 acres used of a 30-acre property — recorded the newer/current by-right
  footprint (5).
  Building sqft conflict: DCD building 1 = 70,000 sqft (two-building plan)
  vs DCF revised by-right 65,000 sqft — recorded the newer figure.
  Capacity: DCD gives building 1 = 10MW and building 2 = 40MW; the 40MW
  building 2 was part of the withdrawn rezoning plan, so only ~10MW
  by-right retained — recorded 10.
  Investment conflict: DCF (Mar 2025) $60M initial / ~$100M full build vs
  DCD (Aug 2024) $100M building 1 / $400M building 2 for the withdrawn
  two-building plan — recorded the newer ~$100M full-build figure.
