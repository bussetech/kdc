notes: >
  Proposed data center in Sanford, York County, ME (~35 miles southwest of
  Portland). In planning, not yet permitted — kept as `announced`, not
  `cancelled`: the two-year moratorium on facilities exceeding 20 MW that
  jeopardizes it is only *proposed*, not enacted, so the project is not yet
  dead. Reported proposed capacity is a 100-300 MW range powered by fuel
  cells, solar, and battery storage; capacity_mw omitted because a single
  numeric value would misrepresent a stated range (range recorded here).
  Single source (DataCenterDynamics) hence medium confidence.
  Developer "Northern New England Energy Company" needs an operators.yml
  entry; developer field omitted until an id exists.