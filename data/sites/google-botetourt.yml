notes: >
  Proposed Google campus at the Botetourt Center at Greenfield business park,
  served by Western Virginia Water Authority (WVWA) municipal water and sewer.
  Developer of record is Helio Capital LLC, an entity representing Google;
  utility-services funding and county performance agreements ($3B, ~150 jobs
  by 2030) are signed, but no land-use construction permit is confirmed here,
  so status stays "announced".

  Water figures conflict by basis and phase, and are resolved conservatively
  to the highest-confidence primary figure. water_usage_gpd is set to the
  2,000,000 gal/day WVWA reserved-capacity ceiling (permitted-max) from the
  county; the county explicitly states Google's reported actual use is lower
  than this planning number, so this is a ceiling, not a measured average.
  Cardinal News (citing Google's 2026 environmental report) frames 2M gal/day
  as the contracted initial figure rising to as much as ~8M gal/day at full
  buildout (estimated) — carried as a separate signal, not averaged in.
  Records released under FOIA and reporting on the water-use disclosure
  dispute (e.g. the Roanoke Rambler) have surfaced higher potential figures;
  the gap between reserved capacity, Google-reported actual use, and
  full-expansion estimates is unresolved and deliberately left in these notes
  rather than collapsed into a single number.

  Botetourt is outside the Greater Richmond Metro focus area but within
  Virginia's deep-coverage scope. Added as the first end-to-end
  water_source / water_usage_gpd / water_usage_basis record (kdc#165) because
  it is the best primary-sourced water figure available in VA right now;
  Henrico/Chesterfield sources so far give only county-aggregate water use,
  not per-site figures.
