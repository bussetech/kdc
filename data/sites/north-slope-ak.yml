notes: >
  Early-stage exploration recorded as a record, not omitted (negatives are
  data). Gov. Dunleavy is courting Amazon, Meta, and Microsoft; toured
  Fairbanks/Anchorage sites with operator Switch; the Air Force offered land at
  Clear Space Force Station and Eielson AFB. No hyperscaler has committed and no
  single physical site is fixed — candidate locations (North Slope framing,
  Fairbanks, Anchorage, Clear SFS, Eielson AFB) span multiple boroughs, so the
  record is held at state level (AK) with no locality/county; the toured sites
  are inconsistent with the "North Slope" label from the hint. operator omitted:
  Switch needs an operators.yml entry, and no hyperscaler is confirmed. Single
  source, exploratory and diffuse — confidence low. status `announced` used as
  the earliest formal state; if this dies without a committed site it should
  move to `cancelled`.
