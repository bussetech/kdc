notes: >
  Very early-stage, single-source, low-confidence record. Volterra Advisors
  conducted a case study for property owner NS Development Partners on building
  a data center at a portion of the 55-acre former Green Plains ethanol plant
  site in Hopewell, VA (an independent city, so no county). No development
  application has been submitted, and the city denies commissioning or
  participating in the study — hence status held at announced (proposed), not a
  filed proposal, and not cancelled.
  capacity_mw (20) is an advisory estimate tied to on-site natural gas lines,
  not a permitted or reported figure; basis omitted for lack of a stated
  measurement.
  developer omitted: NS Development Partners (property owner) needs an
  operators.yml entry, and Volterra Advisors is the advisory firm, not a
  developer of record.
