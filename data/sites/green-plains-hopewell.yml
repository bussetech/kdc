notes: >-
  Proposed small data center — would be Hopewell's first-ever — on the
  former Green Plains ethanol plant site (55 acres) at 701 6th Ave.,
  Hopewell, VA. A case study by Volterra Advisors with the city and
  property owners found the site conducive. Site purchased by NS
  Development Partners; neither NS Development Partners nor Volterra
  Advisors has a canonical-entities entry, so developer/operator omitted
  (would need entries if they recur). capacity_mw (20) and building
  footprint are Volterra founder estimates; the building estimate is a
  range of ~50,000–70,000 sq ft, which cannot be a single numeric value,
  so it is recorded here in notes rather than in building_sqft.
  capacity_mw_basis omitted (source does not say IT vs utility). Single
  source, so medium confidence.
