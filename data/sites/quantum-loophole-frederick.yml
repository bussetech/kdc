notes: >
  Master-planned 2,100-acre gigawatt-scale campus at the former Alcoa
  Eastalco Works; distinct from the smaller 74.89-acre Aligned campus within
  it (aligned-frederick). Site acquired June 2021; TPG affiliate Catellus now
  sole developer. capacity_mw = ~1 GW cited as transmission available (not
  confirmed IT load), hence basis unspecified. investment_usd = ~$100M is the
  land acquisition cost, not total project spend. building_sqft omitted: the
  "up to 600,000 sq ft" figure is a per-building build-to-suit maximum, not a
  campus total. Developer Catellus / Quantum Loophole (TPG) has no
  operators.yml entry and needs one; developer field omitted rather than
  invent an id. Single-source (Data Center Frontier).