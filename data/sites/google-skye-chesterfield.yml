notes: >
  Upper Magnolia Green property. Acreage reported as 887.7 (DCD, June 2026, used
  here as more specific/newer) and ~880 (county). Planned as five data center
  buildings plus three substations; buildings=5 records the DC count.
  Skye + Loch (~1,200 acres) bought for ~$60M in 2025. As of June 2026 the site
  is in USACE regulatory/wetlands permitting (public notice NAO-2026-00282,
  referenced but usace.army.mil blocked automated fetch); status kept at
  announced since permits are in process, not granted.