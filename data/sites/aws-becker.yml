notes: >-
  348-acre site adjacent to Xcel's Sherco coal plant in Becker, MN
  (Sherburne County). investment_usd (73,560,000) is the reported price
  paid for the site, not total project spend. Plans were suspended/paused
  (May 2025) during a dispute over Minnesota data-center tax-credit
  legislation; Amazon retained the land. The status enum has no
  "suspended/paused" value: recorded as `announced` (pre-construction, not
  abandoned since the land was retained and the dispute may resolve) rather
  than `cancelled`, with the suspension noted here. Single-source (DCD),
  hence medium confidence.