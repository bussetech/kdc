notes: >
  One of two distinct AWS campuses announced under a single June 2025
  Pennsylvania program; the other is the Falls Township campus in Bucks
  County (recorded separately as aws-falls-township). This campus is
  reported as being sited next to the Susquehanna nuclear plant
  (sig-20260706-aws-pa-status), consistent with Salem Township, Luzerne
  County. Program-wide totals ($20bn investment, 15 buildings) are reported
  jointly for both campuses and are held on the aws-falls-township record as
  program context, not attributed per site. The location signal
  (sig-20260706-aws-pa-location) names both campuses and is listed on both
  site records as the shared source of each locality.