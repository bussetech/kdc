notes: >
  350-acre section of Watkins Centre South near Route 288, held for future
  development. Google stated it had no plans to develop Loch (or the adjacent
  Skye) "right now" as of the Aug 2025 announcement. Loch + Skye (~1,200 acres)
  were bought for ~$60M in 2025. July 2026 WTVR reporting re-confirms the
  350-acre figure and the Watkins Centre South / Route 288 location.
