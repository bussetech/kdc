notes: >
  Under construction: first two of eight buildings operational Sept 2025;
  ~0.3 GW / 4 of 8 buildings operational as of April 2026 (Epoch); full
  8-building / 1.2 GW build projected Q4 2026 (capacity_mw shown is the 1.2 GW
  committed campus, which conflicts by frame with the ~0.3 GW operational
  figure). The 1.2 GW campus power figure is now supported by Lancium
  (developer, 2025-03-18) alongside the earlier DCD/Epoch reporting.
  buildings=8 is the full-buildout count from Lancium (2025-03-18). Oracle
  leases and operates capacity for OpenAI — Oracle needs an operators.yml
  entry (operator field set to openai).
  building_sqft is left blank: sources conflict by frame and precision —
  Develop Abilene (2024-11-19) cites a single 998,000-sq-ft Crusoe building,
  while Lancium (2025-03-18) describes eight ~half-million-sq-ft buildings at
  full buildout (~4M sq ft total). Emitting either as a site-wide number
  would invent precision (KB-0002), so both are held in notes pending a
  clean sourced figure.
  A ~600 MW Abilene expansion was scrapped in 2026 (power not ready in time)
  while the broader 4.5 GW Oracle-OpenAI agreement remains on track — now
  corroborated by both Tom's Hardware and DataCenterDynamics
  (sig-20260706-abilene-expansion-cancelled). This is a dropped expansion
  phase, not the whole site; site status remains under-construction.
