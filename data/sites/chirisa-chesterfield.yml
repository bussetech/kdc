notes: >
  Mixed-status, multi-phase campus developed by the first PowerHouse–Chirisa JV
  for CoreWeave. Phases: CTP-01 operational (ex-Capital One facility, CoreWeave
  tenant); CTP-02/CTP-03 under construction under a Blue Owl JV for delivery
  2025-2026. Status set to operational because CTP-01 is live; construction of
  CTP-02/03 tracked here.
  Capacity omitted as a single number: DCD gives CTP-01 28MW while Baxtel reports
  6MW upgraded to 18MW (2024); CTP-02/03 cited at 120MW. No source gives a single
  campus total, so no aggregate figure is asserted.
  Operational_date reflects the original build; DCD says 2013, Baxtel says opened
  early 2014.
  Tenant CoreWeave has no operators.yml entry (tenant, not operator/developer).
  developer set to powerhouse and operator to chirisa to represent the JV.