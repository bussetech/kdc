notes: >-
  This record covers TWO distinct campuses announced together in Sept 2024:
  Pine Hill Business Campus (Ridgeville) and Winding Woods Commerce Park
  (St. George). Per the two-campuses-two-records rule they should become
  separate records, but every current signal is joint — the $2B investment,
  the location pair, and the "two new campuses / 200 operational jobs" status
  are all reported combined with no per-campus breakdown. Splitting now would
  require either duplicating signals across records (breaking the
  one-signal-one-site consumption contract) or inventing per-campus values, so
  a single county-level record is retained until per-campus signals arrive.
  investment_usd is the combined $2B. No single locality chosen (two equally
  valid — Ridgeville, St. George), so id/place resolve to Dorchester County.
  Source phrased status as "announced/under construction"; recorded as
  under-construction, with the ambiguity noted.