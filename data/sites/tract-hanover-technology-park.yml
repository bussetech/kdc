notes: >
  Tract is master developer; end-user operators not yet announced.
  Building-count conflict: took ~30 (GRPVA, 2025-05-23) as the newer,
  economic-development-partner figure over "up to 46" (DCD, 2024-05-08);
  DCD's higher figure is not dropped and is recorded here. capacity_mw
  2400 is the full-build campus power capacity (GW-scale master plan),
  not built capacity. Unanimous Planning Commission + Board approval in
  early 2024; permitted with horizontal development reportedly to begin
  2025 — arguably transitioning to under-construction, held at permitted
  pending confirmation of active construction. VPM reportedly dates a
  supervisors' vote to 2026-03-28 but VPM blocks fetch.