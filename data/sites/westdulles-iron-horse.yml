notes: >
  Still a live/pending application (kept as announced, not cancelled).
  230-acre site split ~60/40 between Town of Ashland and Hanover County;
  Ashland approved its portion Oct 2024, Hanover supervisors denied the
  Hanover portion Dec 2024; WestDulles refiled a revised, scaled-back
  Hanover-side application in 2025 (Richmond BizSense, fetch blocked).
  The current rezoning was deferred at the June 2026 Planning Commission
  and returns July 16, 2026 — outcome unknown as of 2026-07-05.
  building_sqft and buildings omitted: data-center option was 2.5-3M sqft
  across 10-12 buildings with an on-site substation, vs an alternative
  1.9M sqft mixed-industrial plan; ranges/alternatives not reducible to a
  single number, so left blank. Pending Hanover ask is ~78 acres of the
  full campus concept.