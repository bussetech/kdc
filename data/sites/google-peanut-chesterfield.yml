notes: >
  Site bought via Peanut LLC (a Google alias) for $18.1M in 2020; ~300-acre site,
  WTVR gives 307 acres (used here). Three buildings; DCD ~855,000 sqft (~285,000
  each), WTVR ~856,000 sqft — agree within rounding.
  investment_usd omitted: the widely-cited $9B is Google's total Virginia
  investment through 2026 (also Loudoun/Prince William), not a site-specific
  figure, which was not disclosed.
  Status held at announced: county said construction to begin by end of 2025 with
  an 18-24 month build, but no fetch-verified source confirms groundbreaking
  despite the Nov 2025 site-plan filing.