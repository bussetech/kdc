notes: >
  Proposed/contested. The application was filed May 4, 2025 — one day before
  the Smithfield Town Council voted a data-center ban in May 2025 — and two
  independent sources (ecoRI News, Ocean State Media) agree the earlier-filed
  application survives despite the ban, so the site is kept as `announced`
  rather than `cancelled`. Site is several hundred acres of woodland off
  Douglas Pike; land area left blank as "several hundred acres" carries no
  sourceable numeric precision (KB-0002). Developer is reported as
  "Hanton City Investments LLC" (single source, ecoRI) — omitted from the
  `developer:` field because it needs an operators.yml entry; no operator is
  reported. Id derived from the site's distinctive proper name ("Smithfield",
  generic "data center" dropped) plus the locality (Smithfield).