notes: >-
  Larger of the two campuses in AWS's ~$11B Louisa County Technology
  Overlay District program (announced August 2023, per Data Center
  Frontier); the $11B covers two campuses (this one plus the Lake Anna
  Technology Campus, aws-lake-anna-louisa) with no disclosed per-campus
  split, so no investment_usd is recorded. Named "North Creek Technology
  Campus" locally but "Northeast Creek" in some DCD coverage — not to be
  confused with the withdrawn third campus near Northeast Creek Reservoir
  (aws-louisa-third-campus), which was explicitly NOT part of this program.
