notes: >
  PowerHouse (AREP) / Chirisa JV on the demolished Cartograf site; developer set
  to powerhouse and operator to chirisa to represent the JV.
  Distinct from the Chirisa CTP-01/02/03 campus (104 acres / former Cartograf vs
  350 acres / ex-Capital One) — kept as separate records.
  Scope conflict: announced as five AI-ready facilities / 600,000+ sqft (PR
  Newswire); Jan 2026 WTVR filing covers two buildings / 380,000 sqft at 1600
  Digital Drive, likely the first phase. building_sqft carries the announced
  600,000+ floor and buildings the announced five; first-phase filing is two
  buildings / 380,000 sqft.
  Timeline slipped: PR release said first delivery 2026 / completion 2028; Jan
  2026 filing says first building operational 2027 (used here, newer). Completion
  2028 per PR.
  capacity_mw 300 is from the Meadowville substation; developers cite a broader
  1GW+ park goal.