notes: >-
  622-acre agricultural-to-light-industrial rezoning developed by Hourigan,
  unanimously approved May 14, 2024; entitles up to 13 data centers with a
  93-ft height cap and ~65% of the site developable. Status recorded as
  permitted (land entitlement/rezoning approved; no specific building
  operator identified here).
  Site includes portions of two Civil War battlefields.
  Dedupe caution: QTS's RIC5 expansion is reported on this Hourigan-rezoned
  land (see qts-ric45-henrico); kept separate as the entitlement/developer
  record vs. the QTS operator project.
