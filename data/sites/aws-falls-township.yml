notes: >
  One of two distinct AWS campuses announced under a single June 2025
  Pennsylvania program; the other is the Salem Township campus in Luzerne
  County (recorded separately as aws-salem-township). Program-wide figures —
  "at least $20 billion" investment (largest private-sector investment in
  state history) and "15 data center buildings planned over the next decade"
  (sig-20260706-aws-pa-investment, sig-20260706-aws-pa-buildings) — are
  reported jointly across both campuses and are NOT split per site in any
  source, so they are held here as program context rather than assigned to
  this site's metrics (blank beats invented). The location signal
  (sig-20260706-aws-pa-location) names both campuses and is therefore listed
  on both site records as the shared source of each locality.